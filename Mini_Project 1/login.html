<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="script.js">
   <style>
         nav{
            background:#8a85852a ;
            
            
        }
        body{
            background-color: #423e3fc2;
            
        }
    </style>
</head>
<body >
       <nav class="navbar navbar-expand-lg navbar-dark  shadow-sm ">
        <div class="container mw-100">
            <a class="navbar-brand fw-bold " href="index.html" style="color: rgba(53, 72, 134, 0.658);">Upgrad Events</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="index.html">Home</a>
                <a class="nav-link" href="login.html" id="nav-login">Login</a>
                <a class="nav-link " href="events.html" id="nav-events-link">Events</a>
                <a class="nav-link" href="contact.html">Contact Us</a>
                <a class="nav-link d-none text-warning" href="#" onclick="logout()" id="nav-logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container w-50 mt-5" >
        <div class="">
            <h2 class="text-center mb-4">Login</h2>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" id="pass" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(email === 'admin@upgrad.com' && pass === '12345') {
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'events.html';
            } else {
                alert('Invalid Credentials!');
            }
        };
    </script>
</body>
</html>
