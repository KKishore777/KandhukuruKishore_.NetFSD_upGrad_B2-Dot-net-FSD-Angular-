<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Events - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
         nav{
            background:#ada6a688 ;
            
            
        }
        body{
            background-color: #462944a2;
            
        }
    </style>
</head>
<body class="">
    <nav class="navbar navbar-expand-lg navbar-dark" style="color:rgb(209, 209, 173)">
        <div class="container mw-100">
            <a class="h4 text-decoration-none m-0 " href="index.html" style="color:rgb(209, 209, 173)">Admin Dashboard</a>
            <button class="btn btn-danger " onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4 mw-100">
        
            <div class="border border-secondary rounded-3">
                <div class="mx-3 my-4">
                    <h5 class="mb-3" style="color:rgb(209, 209, 173)">Add Event</h5>
                    <form id="add-event-form">
                        <input type="number" id="evId" class="form-control mb-2" placeholder="Event ID" required>
                        <input type="text" id="evName" class="form-control mb-2" placeholder="Event Name" required>
                        <select id="evCat" class="form-select mb-2" required>
                            <option value="">Category</option>
                            <option>Tech & Innovations</option>
                            <option>Industrial Events</option>
                        </select>
                        <input type="date" id="evDate" class="form-control mb-2" required>
                        <input type="time" id="evTime" class="form-control mb-2" required>
                        <input type="url" id="evUrl" class="form-control mb-2" placeholder="Meeting URL" required>
                        <button class="btn btn-primary mt-2">Add Event</button>
                    </form>
                </div>
            </div>  
        </div>
    </div>
    <div class="container mw-100 mt-4 mb-5">
         <div class="border border-secondary rounded-2 "  >
                <h5 class="mb-1 mx-3 mt-3 " style="color:rgb(209, 209, 173)">Search Event</h5>
                <div class="row my-3 ">
                    <div class="input-group gap-4 mb-4 ">
                        <input type="text " id="searchInput" class="form-control border-primary col-4 m-lg-2 rounded-2" 
                               placeholder="Event Id...">
                         <select id="searchCategory" class="form-control border-primary col-3 m-lg-2 rounded-2" required>
                            <option value="">Category</option>
                            <option>Tech & Innovations</option>
                            <option>Industrial Events</option>
                        </select>
                        <button class="btn btn-primary col-4 m-lg-2   rounded-2" onclick="searchEvents()">Search</button>
                    </div>
                </div>
        </div>
    </div>
    <div class="container mw-100">
         <div id="admin-event-list" class="row g-4 "></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
